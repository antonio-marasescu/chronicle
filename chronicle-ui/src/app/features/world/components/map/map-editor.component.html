<div class="h-full w-full relative">
  <canvas
    #mapCanvas
    class="absolute inset-0 h-full w-full"
    (click)="onCanvasClick($event)"
    (wheel)="onWheel($event)"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseUp()"
  ></canvas>
</div>
